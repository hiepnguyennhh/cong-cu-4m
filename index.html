<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Town Rule #1 Analyzer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #c0392b; text-align: center; font-size: 24px; }
        .section { margin-bottom: 15px; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-fetch { background: #34495e; color: white; }
        .btn-calc { background: #c0392b; color: white; font-size: 18px; }
        #resultArea { margin-top: 20px; display: none; }
        canvas { max-width: 100%; height: 250px !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Rule #1 Analyzer</h1>

    <div class="section">
        <label>ID Google Sheet:</label>
        <input type="text" id="sheetId" placeholder="Dán ID bảng tính vào đây">
        <label>Mã cổ phiếu:</label>
        <input type="text" id="symbol" placeholder="VNM, HPG..." style="text-transform: uppercase;">
        <button class="btn-fetch" onclick="fetchFromSheet()">ĐỒNG BỘ DỮ LIỆU</button>
    </div>

    <div class="section">
        <label>Đạt chuẩn 3M?</label>
        <select id="m3_status">
            <option value="1">ĐÃ ĐẠT (Meaning, Moat, Mgmt)</option>
            <option value="0">CHƯA ĐẠT</option>
        </select>
        <label>EPS hiện tại:</label>
        <input type="number" id="eps">
        <label>Giá thị trường:</label>
        <input type="number" id="marketPrice">
        <label>Tốc độ tăng trưởng (%):</label>
        <input type="number" id="growth" value="15">
    </div>

    <button class="btn-calc" onclick="runAnalysis()">PHÂN TÍCH</button>

    <div id="resultArea">
        <div id="textContent"></div>
        <canvas id="myChart"></canvas>
    </div>
</div>

<script>
    // (Giữ nguyên phần JavaScript cũ ở đây)
</script>

</body>
</html>

<script>
    // 1. Hàm lấy dữ liệu từ Google Sheets
    async function fetchFromSheet() {
        const sheetId = document.getElementById('sheetId').value.trim();
        const symbol = document.getElementById('symbol').value.toUpperCase().trim();
        
        if (!sheetId || !symbol) {
            alert("Vui lòng nhập ID Sheet và Mã cổ phiếu!");
            return;
        }

        // Chuyển đổi sang định dạng CSV để đọc dễ dàng
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

        try {
            const response = await fetch(url);
            const data = await response.text();
            
            // Xử lý dữ liệu CSV
            const rows = data.split('\n').map(row => {
                return row.split(',').map(cell => cell.replace(/^"(.*)"$/, '$1'));
            });

            // Tìm mã chứng khoán ở cột đầu tiên (Cột A)
            const found = rows.find(r => r[0] && r[0].trim().toUpperCase() === symbol);

            if (found) {
                document.getElementById('eps').value = found[1]; // Cột B
                document.getElementById('marketPrice').value = found[2]; // Cột C
                alert("Đã cập nhật dữ liệu cho: " + symbol);
            } else {
                alert("Không tìm thấy mã " + symbol + " trong bảng tính!");
            }
        } catch (error) {
            alert("Lỗi kết nối! Hãy chắc chắn bạn đã: \n1. Chia sẻ Sheet ở chế độ 'Bất kỳ ai có liên kết'.\n2. Dán đúng ID bảng tính.");
        }
    }

    // 2. Hàm tính toán và vẽ biểu đồ
    let myChart = null;
    function runAnalysis() {
        const m3 = parseInt(document.getElementById('m3_status').value);
        const eps = parseFloat(document.getElementById('eps').value);
        const growth = parseFloat(document.getElementById('growth').value) / 100;
        const marketPrice = parseFloat(document.getElementById('marketPrice').value);
        
        if(isNaN(eps) || isNaN(marketPrice)) {
            alert("Vui lòng nhập hoặc tra cứu số liệu trước!");
            return;
        }

        // Công thức Phil Town
        const pe = (growth * 100) * 2;
        const futureEPS = eps * Math.pow((1 + growth), 10);
        const futurePrice = futureEPS * pe;
        const stickerPrice = futurePrice / Math.pow(1.15, 10);
        const mosPrice = stickerPrice * 0.5;

        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'block';
        
        const isSafe = (m3 && marketPrice <= mosPrice);
        document.getElementById('textContent').innerHTML = `
            <div style="text-align:center; padding:10px; border-radius:8px; background:${isSafe ? '#d4edda' : '#f8d7da'}">
                <h2 style="margin:0">${isSafe ? "✅ NÊN MUA" : "❌ CHƯA NÊN MUA"}</h2>
                <p>Giá trị thực: <b>${Math.round(stickerPrice).toLocaleString()}đ</b></p>
                <p>Giá mua an toàn (MOS): <b style="color:red">${Math.round(mosPrice).toLocaleString()}đ</b></p>
            </div>
        `;

        updateChart(marketPrice, stickerPrice, mosPrice);
    }

    function updateChart(curr, stick, mos) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Giá thị trường', 'Giá MOS', 'Giá trị thực'],
                datasets: [{
                    label: 'VND',
                    data: [curr, mos, stick],
                    backgroundColor: ['#95a5a6', '#27ae60', '#2980b9']
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
